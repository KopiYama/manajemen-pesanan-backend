# Konfigurasi Server
# Menjalankan aplikasi pada port 8081 untuk menghindari konflik dengan port default 8080
server.port=8081

# Konfigurasi Database PostgreSQL
# Menghubungkan ke database 'order_db' pada localhost port 5432
spring.datasource.url=jdbc:postgresql://localhost:5432/order_db
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=org.postgresql.Driver

# Konfigurasi JPA / Hibernate
# ddl-auto=update: Otomatis membuat atau memperbarui struktur tabel berdasarkan Entity Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Konfigurasi Redis
# Digunakan untuk caching atau manajemen session pada localhost port 6379
spring.data.redis.host=localhost
spring.data.redis.port=6379

# Konfigurasi Apache Kafka (Producer)
# Menentukan alamat broker Kafka dan serializer untuk mengirim pesan/event
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# Konfigurasi Apache Kafka (Consumer)
spring.kafka.consumer.group-id=order-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Eureka Configuration
spring.application.name=order-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
