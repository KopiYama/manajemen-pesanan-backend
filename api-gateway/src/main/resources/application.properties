server.port=8080
spring.application.name=api-gateway
eureka.client.service-url.defaultZone=http://eureka-server:8761/eureka
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

# Custom Routes
spring.cloud.gateway.routes[0].id=order-service
spring.cloud.gateway.routes[0].uri=lb://order-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.routes[1].id=notification-service
spring.cloud.gateway.routes[1].uri=lb://notification-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/notifications/**

spring.cloud.gateway.routes[2].id=kitchen-service
spring.cloud.gateway.routes[2].uri=lb://kitchen-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/kitchen/**

spring.cloud.gateway.routes[3].id=menu-service
spring.cloud.gateway.routes[3].uri=lb://menu-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/menu/**
