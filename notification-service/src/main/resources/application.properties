server.port=8082

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/notification_db

# Kafka Configuration
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-group
spring.kafka.consumer.auto-offset-reset=earliest

# Kafka Deserializer Configuration
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer

# Menggunakan ErrorHandlingDeserializer untuk membungkus JsonDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer

# Trusted Packages
spring.kafka.consumer.properties.spring.json.trusted.packages=*

# Type Mapping: Memetakan class DTO dari producer ke consumer karena perbedaan package
spring.kafka.consumer.properties.spring.json.type.mapping=com.restoran.serviceorder.dto.OrderEventDTO:com.restoran.notificationservice.dto.OrderEventDTO