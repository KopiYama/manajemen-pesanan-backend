server.port=8084

# MySQL Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/menu_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# MinIO Configuration (for reference in service logic)
minio.url=http://localhost:9000
minio.access-key=minioadmin
minio.secret-key=minioadmin123
minio.bucket-name=menu-images

# Logging
logging.level.com.restoran.menuservice=INFO

# Eureka Configuration
spring.application.name=menu-service
eureka.client.service-url.defaultZone=http://localhost:8761/eureka
